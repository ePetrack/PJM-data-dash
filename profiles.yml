pjm_dash:
  target: ci
  outputs:
    # CI: pure in-memory DuckDB, no external files needed.
    # config_options are passed as config= to duckdb.connect() at connection
    # time, before DuckDB can attempt to auto-install built-in extensions.
    # (settings: are applied post-connection via SET commands — too late to
    # prevent the "parquet" download attempt in network-restricted envs.)
    ci:
      type: duckdb
      path: ':memory:'
      threads: 1
      config_options:
        autoinstall_known_extensions: false
        autoload_known_extensions: false

    # prod: writes to a persistent DuckDB file so export_duckdb.py can attach
    # and read the mart tables after dbt exits.
    # Override DBT_PATH and DATA_DIR in the environment (set by GitHub Actions).
    prod:
      type: duckdb
      path: "{{ env_var('DBT_PATH', '/tmp/pjm_dash.duckdb') }}"
      threads: 4
      config_options:
        autoinstall_known_extensions: false
        autoload_known_extensions: false
