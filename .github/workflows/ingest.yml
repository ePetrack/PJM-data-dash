name: Ingest EIA data

# Daily ingest from EIA bulk CSV downloads (no API key required).
# Re-downloads the current year's files which EIA updates ~weekly.
# For historical backfill of prior years, use backfill.yml instead.

on:
  schedule:
    # Daily at 06:00 UTC (EIA updates ~weekly, daily is more than enough)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      years:
        description: "Space-separated years to refresh (default: current year)"
        default: ""
      types:
        description: "File types: zones, hubs, load, rt_zones (space-separated)"
        default: "zones hubs load"

concurrency:
  group: ingest
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main (scripts)
        uses: actions/checkout@v4
        with:
          ref: main
          path: repo

      - name: Initialise or checkout data branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git clone "$REPO_URL" data-branch \
            --branch data --depth 1 2>/dev/null \
          || (
            git clone "$REPO_URL" data-branch --depth 1
            cd data-branch
            git checkout --orphan data
            git rm -rf . --quiet || true
            mkdir -p data
            touch data/.gitkeep
            git add data/.gitkeep
            git -c user.name="github-actions[bot]" \
                -c user.email="github-actions[bot]@users.noreply.github.com" \
                commit -m "init: data branch"
            git push origin data
          )

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas pyarrow

      - name: Fetch EIA data (current year, refresh mode)
        run: |
          CURRENT_YEAR=$(date -u +%Y)
          YEARS="${{ github.event.inputs.years || '' }}"
          YEARS="${YEARS:-$CURRENT_YEAR}"

          TYPES="${{ github.event.inputs.types || 'zones hubs load' }}"

          python repo/scripts/backfill_eia.py \
            --years $YEARS \
            --types $TYPES \
            --refresh \
            --output data-branch/data/

      - name: Commit Parquet files to data branch
        working-directory: data-branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "Nothing new to commit" && exit 0
          git commit -m "ingest: EIA refresh $(date -u +%Y-%m-%d)"
          git push origin data

      - name: Trigger transform workflow
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'transform.yml',
              ref: 'main',
            })
